{% extends "django_app/base.html" %}
{% block content %}
<div class="container mt-4">
    <h1>New Event</h1>
    
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
        {% endfor %}
    {% endif %}
    
    <form method="POST" class="mt-4">
        {% csrf_token %}
        <div class="form-group">
            <label for="ev-subject">Subject <span class="text-danger">*</span></label>
            <input class="form-control" id="ev-subject" name="ev-subject" type="text" required>
        </div>
        
        <div class="form-group">
            <label for="ev-attendees">Attendees</label>
            <input class="form-control" id="ev-attendees" name="ev-attendees" type="text"
                placeholder="Separate multiple email addresses with a semicolon (;)">
            <small class="form-text text-muted">Example: user1@example.com; user2@example.com</small>
        </div>
        
        <div class="form-row">
            <div class="col">
                <div class="form-group">
                    <label for="ev-start">Start <span class="text-danger">*</span></label>
                    <input class="form-control" id="ev-start" name="ev-start" type="datetime-local" required>
                </div>
            </div>
            <div class="col">
                <div class="form-group">
                    <label for="ev-end">End <span class="text-danger">*</span></label>
                    <input class="form-control" id="ev-end" name="ev-end" type="datetime-local" required>
                </div>
            </div>
        </div>
        
        <div class="form-group">
            <label for="ev-body">Description</label>
            <textarea class="form-control" id="ev-body" name="ev-body" rows="3"></textarea>
        </div>
        
        <div class="form-group">
            <input class="btn btn-primary mr-2" type="submit" value="Create Event">
            <a class="btn btn-secondary" href="{% url 'django_app.calendar:calendar' %}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
